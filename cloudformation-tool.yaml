AWSTemplateFormatVersion: '2010-09-09'
Description: Bug report tool - DynamoDB table, Lambda function, and IAM role

Resources:

  BugReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - BugReports-${Suffix}
        - Suffix: !Select [0, !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]]]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ticketId
          AttributeType: S
      KeySchema:
        - AttributeName: ticketId
          KeyType: HASH

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - create-bug-report-role-${Suffix}
        - Suffix: !Select [0, !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]]]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBPutItem
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt BugReportsTable.Arn

  CreateBugReportFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub
        - create-bug-report-${Suffix}
        - Suffix: !Select [0, !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]]]
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref BugReportsTable
      Code:
        ZipFile: |
          import json
          import os
          import uuid
          from datetime import datetime, timezone
          import boto3

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])

          REQUIRED_FIELDS = ("description", "stepsToReproduce", "environment")

          def lambda_handler(event, _):
              print("EVENT:", json.dumps(event, indent=2, default=str))

              if event.get("messageVersion") != "1.0" or event.get("function") != "create_bug_report":
                  return _resp(event, {"error": "unsupported"})

              params = event.get("parameters") or []
              body = {
                  p.get("name"): p.get("value")
                  for p in params
                  if isinstance(p, dict) and p.get("name") is not None
              }

              description = (body.get("description") or "").strip()
              steps = (body.get("stepsToReproduce") or "").strip()
              environment = (body.get("environment") or "").strip()

              if not description:
                  return _resp(event, {"error": "missing", "field": "description"})

              ticket_id = str(uuid.uuid4())
              item = {
                  "ticketId": ticket_id,
                  "description": description,
                  "stepsToReproduce": steps,
                  "environment": environment,
                  "status": "OPEN",
                  "createdAt": datetime.now(timezone.utc).isoformat(),
              }

              table.put_item(Item=item)

              return _resp(event, {"ticketId": ticket_id, "status": "OPEN"})


          def _resp(event, obj):
              return {
                  "messageVersion": "1.0",
                  "response": {
                      "actionGroup": event.get("actionGroup"),
                      "function": event.get("function"),
                      "functionResponse": {
                          "responseBody": {
                              "TEXT": {
                                  "body": json.dumps(obj)
                              }
                          }
                      },
                  },
              }

  BedrockInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CreateBugReportFunction.Arn
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com

Outputs:
